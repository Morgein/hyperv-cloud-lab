services:
  api:
    build: .
    container_name: cloudlab-api
    restart: unless-stopped
    ports:
      - "8080:8000"
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
