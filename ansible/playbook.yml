---
- name: Commmon setup for all CloudLab VMs
  hosts: all
  become: true

  vars:
    lab_network: "192.168.0.0/24"
    monitoring_ip: "192.168.0.113"
    app_ip: "192.168.0.110"
    proxy_ip: "192.168.0.111"

  tasks:
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Install common packages
      ansible.builtin.apt:
        name:
          - curl
          - wget
          - git
          - vim
          - htop
          - net-tools
          - unzip
          - ca-certificates
          - gnupg
          - ufw
          - prometheus-node-exporter
        state: present

    - name: Allow SSH from lab network
      community.general.ufw:
        rule: allow
        from_ip: "{{ lab_network }}"
        port: "22"
        proto: tcp

    - name: Allow Nodeexporter from monitoring VM
      community.general.ufw:
        rule: allow
        from_ip: "{{ monitoring_ip }}"
        port: "9100"
        proto: tcp
    
    - name: Set UFW default incoming policy to deny
      community.general.ufw:
        direction: incoming
        policy: deny

    - name: Set UFW default outgoing policy to allow
      community.general.ufw:
        direction: outgoing
        policy: allow

    - name: Enable UFW
      community.general.ufw:
        state: enabled

- name: Configure Nginx reverse proxy
  hosts: proxy
  become: true


  vars:
    lab_network: "192.168.0.0/24"
    app_ip: "192.168.0.110"

  handlers:
    - name: Restart nginx
      ansible.builtin.systemd:
        name: nginx
        state: restarted

  tasks:
    - name: Install Nginx
      ansible.builtin.apt:
        name:
          - nginx
          - fail2ban
        state: present
        update_cache: true
    
    
    - name: Deploy Cloudlab Nginx config
      ansible.builtin.template:
        src: templates/cloudlab.conf.j2
        dest: /etc/nginx/sites-available/cloudlab
        owner: root
        group: root
        mode: "0644"
      notify: Restart Nginx

    - name: Remove default Nginx site
      ansible.builtin.file:
        path: /etc/nginx/sites-enabled/default
        state: absent
      notify: Restart nginx

    - name: Enable CloudLab Nginx site
      ansible.builtin.file:
        src: /etc/nginx/sites-available/cloudlab
        dest: /etc/nginx/sites-enabled/cloudlab
        state: link
      notify: Restart nginx

    - name: Test Nginx configuration
      ansible.builtin.command: nginx -t
      changed_when: false

    - name: Enable and start Nginx
      ansible.builtin.systemd:
        name: nginx
        enabled: true
        state: started

    - name: Enabble and start Fail2ban
      ansible.builtin.systemd:
        name: fail2ban
        enabled: true
        state: started

    - name: Allow HTTP from lab network
      community.general.ufw:
        rule: allow
        from_ip: "{{ lab_network }}"
        port: "80"
        proto: tcp


- name: Configure Dockerized API application
  hosts: api
  become: true

  vars:
    proxy_ip: "192.168.0.111"
    db_ip: "192.168.0.112"
    postgres_db: "cloudlab_app"
    postgres_user: "cloudlab_user"
    postgres_password: "Change"
    app_dir: "/opt/cloudlab-app"

  tasks:
    - name: Install Docker packages
      ansible.builtin.apt:
        name:
          - docker.io
          - docker-compose-plugin
        state: present
        update_cache: true

    - name: Enable and start Docker
      ansible.builtin.systemd:
        name: docker
        enabled: true
        state: started

    - name: Add cloudadmin user to docker group
      ansible.builtin.user:
        name: cloudadmin
        groups: docker
        append: true
    
    - name: Create application directory
      ansible.builtin.file:
        path: "{{ app_dir }}"
        state: directory
        owner: cloudadmin
        group: cloudadmin
        mode: "0755"
    
    - name: Copy FastAPI application file
      ansible.builtin.copy:
        src: ../app/app.py
        dest: "{{ app_dir }}/app.py"
        owner: cloudadmin
        group: cloudadmin
        mode: "0644"

    - name: Copy requirements file
      ansible.builtin.copy:
        src: ../app/requirements.txt
        dest: "{{ app_dir }}/requirements.txt"
        owner: cloudadmin
        group: cloudadmin
        mode: "0644"
    
    - name: Copy Dockerfile
      ansible.builtin.copy:
        src: ../app/Dockerfile
        dest: "{{ app_dir }}/Dockerfile"
        owner: cloudadmin
        group: cloudadmin
        mode: "0644"

    - name: Copy docker-compose.yml
      ansible.builtin.copy:
        src: ../app/docker-compose.yml
        dest: "{{ app_dir }}/docker-compose.yml"
        owner: cloudadmin
        group: cloudadmin
        mode: "0644"

    - name: Create application .env file
      ansible.builtin.copy:
        dest: "{{ app_dir }}/.env"
        owner: cloudadmin
        group: cloudadmin
        mode: "0600"
        content: |
          DATABASE_URL=postgresql://{{ postgres_user }}:{{ postgres_password }}@{{ db_ip }}:5432/{{ postgres_db }}

    - name: Stop old Docker Compose application from previous manual deployment
      ansible.builtin.command:
          cmd: docker compose down
          chdir: /home/cloudadmin/cloudlab-app
      register: old_compose_down
      failed_when: false
      changed_when: old_compose_down.rc == 0

    - name: Remove old CloudLab API container if it exists
      ansible.builtin.command: 
        cmd: docker rm -f cloudlab-api
      register: remove_old_api_container
      failed_when: false
      changed_when: remove_old_api_container.rc == 0


    - name: Deploy API container with Docker Compose
      ansible.builtin.command:
        cmd: docker compose up -d --build
        chdir: "{{ app_dir }}"
      changed_when: true

    - name: Allow API port only from proxy VM
      community.general.ufw:
        rule: allow
        from_ip: "{{ proxy_ip }}"
        port: "8080"
        proto: tcp

